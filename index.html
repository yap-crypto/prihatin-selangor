<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#F3F0E8;
  --surface:#FFFFFF;
  --surface-2:#FAF8F2;
  --ink:#1B1E1A;
  --ink-soft:#6C6F66;
  --ink-faint:#9CA093;
  --accent:#1E5A39;
  --accent-2:#2E7A50;
  --accent-soft:#E7EFE8;
  --amber:#8A5E17;
  --amber-soft:#F1E7D2;
  --terra:#A2452E;
  --terra-soft:#F1E0D9;
  --line:#E7E2D4;
  --line-soft:#EFEBDF;
  --radius:16px;
  --radius-sm:11px;
  --shadow-sm:0 1px 2px rgba(27,30,26,.05);
  --shadow:0 1px 2px rgba(27,30,26,.04),0 10px 30px rgba(27,30,26,.06);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  display:flex;
  justify-content:center;
}
::selection{background:var(--accent-soft);}
button{font-family:inherit;}

.phone{
  width:100%;
  max-width:440px;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
}
@media(min-width:520px){
  body{padding:26px 0;align-items:flex-start;}
  .phone{min-height:calc(100vh - 52px);border:1px solid var(--line);border-radius:26px;overflow:hidden;box-shadow:var(--shadow);}
}

/* ---------- HEADER ---------- */
.topbar{
  background:var(--surface);
  padding:calc(20px + env(safe-area-inset-top)) 20px 18px;
  position:relative;
  border-bottom:1px solid var(--line-soft);
}
.topbar-controls{
  position:absolute;
  top:calc(16px + env(safe-area-inset-top)); right:16px;
  display:flex; gap:6px;
}
.topbar-controls button{
  background:var(--surface-2);
  border:1px solid var(--line);
  color:var(--ink-soft);
  font-size:11px;
  font-weight:600;
  letter-spacing:.01em;
  padding:7px 11px;
  border-radius:100px;
  cursor:pointer;
  transition:background .15s var(--ease), color .15s var(--ease);
  display:inline-flex;align-items:center;gap:5px;
}
.topbar-controls button:hover{background:var(--accent-soft);color:var(--accent);}
.topbar-controls button svg{width:14px;height:14px;}
.del-btn{
  background:none; border:none; cursor:pointer;
  color:var(--ink-faint);
  margin-left:auto; padding:3px;
  border-radius:8px;
  flex-shrink:0; line-height:0;
  transition:color .15s var(--ease), background .15s var(--ease);
}
.del-btn svg{width:15px;height:15px;}
.del-btn:hover{background:var(--terra-soft); color:var(--terra);}
.topbar .eyebrow{
  font-family:'Space Mono',monospace;
  font-size:10.5px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--accent);
  margin:0 0 9px;
  display:flex;align-items:center;gap:7px;
}
.topbar .eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);}
.wordmark{display:flex;align-items:center;gap:11px;margin:0 0 7px;}
.wordmark .mark{width:34px;height:34px;flex-shrink:0;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.wordmark .mark svg{width:19px;height:19px;color:#fff;}
.topbar h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:25px;
  letter-spacing:-0.01em;
  line-height:1.08;
  margin:0;
}
.topbar p{
  margin:9px 0 0;
  font-size:13px;
  line-height:1.5;
  color:var(--ink-soft);
  max-width:330px;
}

/* ---------- TABS ---------- */
.tabbar{
  display:flex;
  gap:2px;
  background:var(--surface);
  border-bottom:1px solid var(--line-soft);
  position:sticky;
  top:0;
  z-index:5;
  padding:6px 10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none;}
.tabbar button{
  flex:1 0 auto;
  border:none;
  background:none;
  padding:9px 12px;
  border-radius:100px;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
  cursor:pointer;
  white-space:nowrap;
  transition:color .2s var(--ease), background .2s var(--ease);
}
.tabbar button:hover{color:var(--ink);}
.tabbar button.active{
  color:#fff;
  background:var(--accent);
}

/* ---------- MAIN ---------- */
main{
  flex:1;
  padding:22px 18px calc(96px + env(safe-area-inset-bottom));
}
.section-title{
  font-family:'Fraunces',serif;
  font-size:23px;
  font-weight:600;
  letter-spacing:-0.01em;
  margin:0 0 5px;
  color:var(--ink);
}
.section-sub{
  font-size:13.5px;
  color:var(--ink-soft);
  margin:0 0 20px;
  line-height:1.55;
}
.subsection-title{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:var(--ink-faint);
  margin:26px 0 13px;
  display:flex;align-items:center;gap:9px;
}
.subsection-title::after{content:"";flex:1;height:1px;background:var(--line);}
.subsection-title:first-of-type{margin-top:0;}
.funded-row{
  display:flex; align-items:center; gap:11px;
  margin:4px 0 12px;
  padding:11px 13px;
  background:var(--surface-2);
  border:1px solid var(--line-soft);
  border-radius:12px;
}
.funded-row .contrib-name{font-size:12.5px;}
.funded-row .contrib-role{font-size:11.5px;}

/* ---------- CARD / FORM ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:16px;
}
label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--ink);
  margin:0 0 7px;
  letter-spacing:0.005em;
}
.field{margin-bottom:17px;}
.field:last-child{margin-bottom:0;}
select, textarea, input[type=text], input[type=url], input[type=date], input[type=email], input[type=password]{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:14px;
  padding:12px 13px;
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  background:var(--surface-2);
  color:var(--ink);
  transition:border-color .15s var(--ease), background .15s var(--ease);
}
textarea{min-height:82px; resize:vertical;}
select:focus, textarea:focus, input:focus{
  outline:none;
  border-color:var(--accent);
  background:var(--surface);
  box-shadow:0 0 0 3px var(--accent-soft);
}
::placeholder{color:var(--ink-faint);}
.loc-row{display:flex; gap:8px;}
.loc-row input{flex:1;}
.loc-btn{
  width:48px; flex-shrink:0;
  border:1px solid var(--line); border-radius:var(--radius-sm);
  background:var(--surface-2); color:var(--accent);
  cursor:pointer; display:flex;align-items:center;justify-content:center;
  transition:background .15s var(--ease);
}
.loc-btn svg{width:18px;height:18px;}
.loc-btn:hover:not(:disabled){background:var(--accent-soft);}
.loc-btn:disabled{opacity:0.5; cursor:default;}
.loc-hint{font-size:11.5px; color:var(--ink-soft); margin:8px 2px 0; line-height:1.45;}
.issue-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
}
.issue-opt{
  border:1px solid var(--line);
  border-radius:13px;
  padding:14px 6px 11px;
  text-align:center;
  font-size:11px;
  font-weight:600;
  color:var(--ink-soft);
  cursor:pointer;
  background:var(--surface-2);
  transition:all .18s var(--ease);
  line-height:1.25;
}
.issue-opt .ic{display:flex;justify-content:center;margin-bottom:8px;}
.issue-opt .ic svg{width:26px;height:26px;stroke-width:1.6;}
.issue-opt:hover{border-color:var(--ink-faint);}
.issue-opt.selected{
  border-color:var(--accent);
  background:var(--accent-soft);
  color:var(--accent);
}
.dropzone{
  border:1.5px dashed var(--line);
  border-radius:13px;
  padding:22px 12px;
  text-align:center;
  cursor:pointer;
  background:var(--surface-2);
  position:relative;
  transition:border-color .15s var(--ease), background .15s var(--ease);
}
.dropzone:hover{border-color:var(--accent);background:var(--accent-soft);}
.dropzone.has-img{padding:0; border-style:solid; border-color:var(--line); overflow:hidden;}
.dropzone img{width:100%; display:block; max-height:190px; object-fit:cover;}
.dropzone .dz-label{font-size:12.5px; color:var(--ink-soft); display:block;}
.dropzone .dz-label .ic{display:flex;justify-content:center;margin-bottom:8px;}
.dropzone .dz-label .ic svg{width:24px;height:24px;color:var(--ink-faint);}
.dropzone input[type=file]{display:none;}
.btn{
  width:100%;
  border:none;
  border-radius:var(--radius-sm);
  padding:14px;
  font-family:'Inter',sans-serif;
  font-size:14.5px;
  font-weight:600;
  letter-spacing:.005em;
  cursor:pointer;
  transition:transform .12s var(--ease), background .15s var(--ease), opacity .15s var(--ease);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn svg{width:17px;height:17px;}
.btn:active{transform:scale(0.985);}
.btn-primary{background:var(--accent); color:#fff;}
.btn-primary:hover{background:var(--accent-2);}
.btn-gold{background:var(--ink); color:#fff;}
.btn-gold:hover{opacity:.9;}
.btn-outline{background:var(--surface); border:1px solid var(--line); color:var(--ink);}
.btn-outline:hover{border-color:var(--ink-soft);}
.btn:disabled{opacity:0.5; cursor:not-allowed;}

/* ---------- TOAST ---------- */
.toast{
  position:fixed;
  bottom:calc(96px + env(safe-area-inset-bottom)); left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--ink);
  color:#fff;
  padding:12px 20px;
  border-radius:100px;
  font-size:13px;
  font-weight:500;
  box-shadow:0 12px 34px rgba(0,0,0,0.22);
  opacity:0;
  pointer-events:none;
  transition:opacity .28s var(--ease), transform .28s var(--ease);
  z-index:120;
  max-width:88%;
  text-align:center;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- FEED CARDS ---------- */
.report-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:15px;
}
.report-media{width:100%;height:158px;object-fit:cover;display:block;background:var(--surface-2);}
.report-body{padding:15px 16px 16px;}
.badge-row{display:flex; align-items:center; gap:7px; margin-bottom:10px; flex-wrap:wrap;}
.pill{
  font-size:10.5px;
  font-weight:600;
  padding:5px 10px;
  border-radius:100px;
  letter-spacing:0.01em;
  display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.pill svg{width:12px;height:12px;}
.pill-pending{background:var(--terra-soft); color:var(--terra);}
.pill-progress{background:var(--amber-soft); color:var(--amber);}
.pill-completed{background:var(--accent-soft); color:var(--accent);}
.pill-type{background:var(--surface-2); color:var(--ink-soft); border:1px solid var(--line);}
.ticket-id{font-family:'Space Mono',monospace; font-size:10.5px; color:var(--ink-faint); margin-left:auto;}
.report-desc{font-size:14.5px; margin:0 0 6px; line-height:1.45; color:var(--ink);}
.report-loc{font-size:12.5px; color:var(--ink-soft); margin:0 0 13px; display:flex;align-items:center;gap:5px;}
.report-loc svg{width:13px;height:13px;flex-shrink:0;color:var(--ink-faint);}
.empty-state{
  text-align:center;
  padding:52px 24px;
  color:var(--ink-soft);
  border:1px dashed var(--line);
  border-radius:var(--radius);
  background:var(--surface-2);
}
.empty-state .ic{display:flex;justify-content:center;margin-bottom:14px;}
.empty-state .ic svg{width:52px;height:52px;color:var(--ink-faint);stroke-width:1.4;}
.empty-state p{font-size:13.5px; line-height:1.6; margin:0;}

/* ---------- MODAL ---------- */
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(20,24,20,0.42);
  backdrop-filter:blur(3px);
  display:flex; align-items:flex-end;
  z-index:100;
  opacity:0; pointer-events:none;
  transition:opacity .22s var(--ease);
}
.modal-overlay.show{opacity:1; pointer-events:all;}
.modal{
  background:var(--bg);
  width:100%;
  max-width:440px;
  margin:0 auto;
  border-radius:24px 24px 0 0;
  padding:12px 20px calc(26px + env(safe-area-inset-bottom));
  max-height:90vh;
  overflow-y:auto;
  position:relative;
  transform:translateY(24px);
  transition:transform .28s var(--ease);
}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-handle{width:38px; height:4px; background:var(--line); border-radius:10px; margin:4px auto 16px;}
.modal-close{
  position:absolute; top:16px; right:18px;
  background:var(--surface-2); border:1px solid var(--line); width:30px;height:30px;border-radius:50%;
  color:var(--ink-soft); cursor:pointer; display:flex;align-items:center;justify-content:center;
}
.modal-close svg{width:15px;height:15px;}
.toggle-group{display:flex; gap:8px; margin-bottom:18px;}
.toggle-opt{
  flex:1; text-align:center; padding:12px 6px;
  border:1px solid var(--line); border-radius:var(--radius-sm);
  font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  background:var(--surface); transition:all .15s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.toggle-opt svg{width:15px;height:15px;}
.toggle-opt.selected{border-color:var(--accent); background:var(--accent-soft); color:var(--accent);}

/* ---------- WALL OF HEROES ---------- */
.hero-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:16px;
}
.compare-wrap{
  position:relative;
  width:100%;
  height:200px;
  overflow:hidden;
  background:var(--surface-2);
}
.compare-wrap img{
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:cover;
}
.compare-wrap .after-img{clip-path:inset(0 0 0 50%);}
.compare-divider{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.9);left:50%;pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
.compare-label{
  position:absolute; top:9px;
  font-family:'Space Mono',monospace;
  font-size:9.5px; font-weight:700;
  background:rgba(20,24,20,0.6); color:#fff;
  padding:3px 8px; border-radius:6px; letter-spacing:0.08em;
  backdrop-filter:blur(2px);
}
.label-before{left:9px;}
.label-after{right:9px;}
.compare-slider{
  position:absolute; bottom:10px; left:10px; right:10px;
  width:calc(100% - 20px);
  -webkit-appearance:none; appearance:none;
  height:3px; border-radius:4px;
  background:rgba(255,255,255,0.55);
  outline:none;
}
.compare-slider::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%;
  background:#fff; border:none;
  cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.35);
}
.hero-body{padding:15px 16px 16px;}
.hero-contrib{
  display:flex; align-items:center; gap:11px;
  margin-top:12px; padding-top:13px;
  border-top:1px solid var(--line-soft);
}
.sponsor-logo{width:38px; height:38px; border-radius:10px; object-fit:cover; flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.contrib-text{flex:1; min-width:0;}
.contrib-name{font-size:13px; font-weight:600; margin:0; color:var(--ink);}
.contrib-role{font-size:11.5px; color:var(--ink-soft); margin:1px 0 0;}
.visit-btn{
  font-size:11.5px; font-weight:600; color:var(--accent);
  border:1px solid var(--line); border-radius:100px;
  padding:7px 13px; text-decoration:none; white-space:nowrap;
  transition:border-color .15s var(--ease);
}
.visit-btn:hover{border-color:var(--accent);}

/* ---------- BOTTOM NAV ---------- */
.bottomnav{
  position:fixed;
  bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:440px;
  background:rgba(255,255,255,0.86);
  backdrop-filter:saturate(180%) blur(14px);
  border-top:1px solid var(--line);
  display:flex;
  padding:9px 6px calc(9px + env(safe-area-inset-bottom));
  z-index:10;
}
.navbtn{
  flex:1; background:none; border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:5px 2px; color:var(--ink-faint);
  transition:color .18s var(--ease);
}
.navbtn .ic{line-height:0;}
.navbtn .ic svg{width:22px;height:22px;stroke-width:1.7;transition:transform .2s var(--ease);}
.navbtn .lb{font-size:9.5px; font-weight:600; letter-spacing:.01em;}
.navbtn.active{color:var(--accent);}
.navbtn.active .ic svg{transform:translateY(-1px) scale(1.06);}

/* ---------- PROFILE ---------- */
.back-link{
  background:none; border:none; cursor:pointer;
  color:var(--ink-soft); font-weight:600; font-size:12.5px;
  padding:0 0 14px; display:inline-flex;align-items:center;gap:5px;
}
.back-link svg{width:14px;height:14px;}
.back-link:hover{color:var(--accent);}
.profile-avatar{
  width:54px; height:54px; border-radius:50%;
  object-fit:cover; flex-shrink:0;
}
.profile-avatar-fallback{
  width:54px; height:54px; border-radius:50%;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:#fff;
}

/* ---------- LEADERBOARD ---------- */
.leader-row{
  display:flex; align-items:center; gap:11px;
  padding:11px 2px; border-bottom:1px solid var(--line-soft);
}
.leader-row:last-child{border-bottom:none;}
.leader-rank{
  font-family:'Space Mono',monospace; font-size:12px;
  color:var(--ink-faint); width:24px; flex-shrink:0; text-align:center;
}
.leader-avatar{width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0;}
.leader-avatar-fallback{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:'Inter';}
.leader-name{flex:1; min-width:0; font-size:13px; font-weight:500; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.leader-points{font-family:'Space Mono',monospace; font-size:12px; font-weight:700; color:var(--accent); flex-shrink:0;}

/* ---------- STAT STRIP ---------- */
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 12px;}
.stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:600;line-height:1;color:var(--ink);}
.stat .l{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin-top:7px;}

/* ---------- AUTH ---------- */
.auth{

}
.auth[hidden]{display:none;}
.auth .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5;pointer-events:none;}
.auth .b1{width:300px;height:300px;background:#CBE0D0;top:-90px;left:-70px;}
.auth .b2{width:260px;height:260px;background:#E7D8B8;bottom:-80px;right:-60px;}
.auth .b3{width:200px;height:200px;background:#D6E8DA;bottom:120px;left:-40px;}
.auth-card{

  width:100%; max-width:380px;

  border:1px solid var(--line);
  border-radius:24px;
  padding:30px 26px 26px;
  box-shadow:var(--shadow);
}
.auth-mark{width:44px;height:44px;border-radius:13px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.auth-mark svg{width:24px;height:24px;color:#fff;}
.auth-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:0 0 8px;}
.auth h2{font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.01em;margin:0 0 6px;}
.auth .sub{font-size:13px;color:var(--ink-soft);margin:0 0 22px;line-height:1.5;}
.auth .field{margin-bottom:14px;}
.auth-err{color:var(--terra);font-size:12.5px;margin:0 0 12px;min-height:0;display:none;}
.auth-err.show{display:block;}
.auth-switch{font-size:13px;color:var(--ink-soft);text-align:center;margin:18px 0 0;}
.auth-switch button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-size:13px;padding:0;}
.auth-switch button:hover{text-decoration:underline;}
.resend-link{background:none;border:none;color:var(--accent);font-weight:600;font-size:12.5px;cursor:pointer;padding:0;margin:-4px 0 14px;display:none;}

.resend-note.show{display:block;}
#confirmPanel .ic{display:flex;justify-content:center;margin-bottom:14px;}
#confirmPanel .ic svg{width:46px;height:46px;color:var(--accent);}

/* ---------- SYNC BAR ---------- */
.sync-bar{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-faint);margin-top:12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;transition:background .2s var(--ease);}
.sync-dot.on{background:var(--accent-2);box-shadow:0 0 0 3px var(--accent-soft);}

/* ---------- MOTION ---------- */
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.will-rise{opacity:0;}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;}
  .will-rise{opacity:1;}
}

.media-ph span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.sponsor-logo svg{width:18px;height:18px;}
.wordmark .mark svg{color:#fff;}
.back-link span{display:inline;}
</style>
</head>

function icon(name, extra){
  const p = _IC[name] || '';
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"${extra?(' class="'+extra+'"'):''} aria-hidden="true">${p}</svg>`;
}
const AV_COLORS = ['#1E5A39','#2E7A50','#8A5E17','#A2452E','#3B5B8C','#6B4A8C','#5C7A2E','#A0662E'];
function avColor(s){ s=(s||'?'); let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function avInit(s){ s=(s||'?').trim(); const p=s.split(/\s+/); return ((p[0]?p[0][0]:'?')+(p[1]?p[1][0]:'')).toUpperCase(); }
function avatarBox(name, cls){ return `<div class="${cls}" style="background:${avColor(name)}">${escapeHtml(avInit(name))}</div>`; }
function sponsorBox(name){ return `<div class="sponsor-logo" style="background:${avColor(name)};color:#fff;font-weight:700;font-size:14px;font-family:'Inter';">${escapeHtml(avInit(name))}</div>`; }
function mediaPlaceholder(issueType){ const m=issueMeta(issueType); return `<div class="media-ph">${m.icon}<span>${state.lang==='ms'?'Tiada foto':'No photo'}</span></div>`; }

/* ==================== motion ==================== */
function motionMain(){
  if(!hasGsap()) return;
  const m = document.getElementById('main'); if(!m) return;
  gsap.set(m,{autoAlpha:1,y:0});
  const kids = m.children; if(!kids.length) return;
  gsap.killTweensOf(kids);
  gsap.fromTo(kids,{y:14,autoAlpha:0},{y:0,autoAlpha:1,duration:.5,ease:'power3.out',stagger:.05,clearProps:'transform,opacity,visibility'});
}
function navigate(v){
  if(state.view===v) return;
  state.view=v;
  if(hasGsap()){ gsap.to('#main',{autoAlpha:0,y:-8,duration:.15,ease:'power2.in',onComplete:render}); }
  else render();
}

// ---------- storage helpers ----------
// NOTE: rewritten to use the browser's localStorage instead of the Claude-artifact
// window.storage API, so this works as a standalone .html file. This means data
// lives only on THIS device/browser (no sharing between users, no cloud sync).
let LS_PREFIX = 'prihatin-selangor::guest::';

async function storGet(key, shared){
  try{
    return localStorage.getItem(LS_PREFIX + key);
  }catch(e){ return null; }
}
async function storSet(key, value, shared){
  try{ localStorage.setItem(LS_PREFIX + key, value); scheduleCloudPush(); }catch(e){ console.error('storage set failed', e); }
}
async function storDelete(key, shared){
  try{ localStorage.removeItem(LS_PREFIX + key); scheduleCloudPush(); }catch(e){ console.error('storage delete failed', e); }
}
async function storList(prefix, shared){
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(LS_PREFIX + prefix) === 0) keys.push(k.slice(LS_PREFIX.length));
    }
    return keys;
  }catch(e){ return []; }
}
async function clearAllAppData(){
  try{
    const toRemove = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(LS_PREFIX) === 0) toRemove.push(k);
    }
    toRemove.forEach(k => localStorage.removeItem(k));
    scheduleCloudPush();
  }catch(e){ console.error('clear all failed', e); }
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-MY', {day:'numeric', month:'short', year:'numeric'});
}
function daysLeft(iso){
  if(!iso) return null;
  const diff = new Date(iso) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

// ---------- image helper ----------
function resizeImage(file, maxWidth=640, quality=0.65){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- auto location (free: browser Geolocation API + OpenStreetMap Nominatim) ----------
async function locateUser(){
  if(!navigator.geolocation){
    state.locHint = t('locUnsupported');
    renderAduan();
    return;
  }
  state.locating = true;
  state.locHint = t('locRequesting');
  renderAduan();

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const {latitude, longitude} = pos.coords;
    let address = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
      if(res.ok){
        const data = await res.json();
        if(data && data.display_name){
          address = data.display_name;
        }
      }
    }catch(e){ /* offline/blocked — fall back to coordinates */ }

    state.newLocation = address;
    state.locating = false;
    state.locHint = t('locDetected');
    renderAduan();
  }, (err) => {
    state.locating = false;
    state.locHint = err.code === 1
      ? t('locDenied')
      : t('locFailed');
    renderAduan();
  }, {enableHighAccuracy:true, timeout:10000});
}

      <div class="field">
        <label>${t('descriptionLabel')}</label>
        <textarea id="descInput" placeholder="${t('descPlaceholder')}">${escapeHtml(state.newDescription || '')}</textarea>
      </div>
      <div class="field">
        <label>${t('locationLabel')}</label>
        <div class="loc-row">
          <input type="text" id="locInput" placeholder="${t('locPlaceholder')}" value="${state.newLocation || ''}" ${state.locating ? 'disabled' : ''}>

        </div>

        <label>${t('beforePhotoLabel')}</label>
        ${dz}
      </div>

    </div>
  `;

  $$('.issue-opt').forEach(el => el.addEventListener('click', () => {
    state.newIssueType = el.dataset.issue;
    renderAduan();
  }));

  const fi = $('#beforePhotoInput');
  if(fi) fi.addEventListener('change', async e => {
    const f = e.target.files[0];
    if(!f) return;
    state.newBeforePhoto = await resizeImage(f);
    renderAduan();
  });

  $('#descInput').addEventListener('input', e => { state.newDescription = e.target.value; });
  $('#locInput').addEventListener('input', e => { state.newLocation = e.target.value; });
  $('#locateBtn').addEventListener('click', locateUser);

  if(!state.locAttempted){
    state.locAttempted = true;
    locateUser();
  }

  $('#submitReportBtn').addEventListener('click', async () => {
    const issueType = state.newIssueType;
    const description = (state.newDescription || '').trim();
    const location = $('#locInput').value.trim();
    const beforePhoto = state.newBeforePhoto;

    if(!issueType){ showToast(t('errIssueType')); return; }
    if(!description){ showToast(t('errDescription')); return; }
    if(!location){ showToast(t('errLocation')); return; }

    const btn = $('#submitReportBtn');
    btn.disabled = true; btn.textContent = t('submitting');

    const ticketId = await nextTicketId();
    const report = {
      ticketId, issueType, description, location,
      beforePhoto: beforePhoto || '',

      fulfillmentType: '', sponsorVolunteerName: '',
      sponsorLogo: '', sponsorWebsite: '', afterPhoto: '',
      donationAmount: 0,
      cleanupDate: '', volunteers: [],
      contractorId: '', contractorName: '', jobDeadline: '',
      dateSubmitted: new Date().toISOString()

    await saveReport(report);
    await loadReports();
    await awardPoints(10);

    state.newIssueType = null;
    state.newBeforePhoto = null;
    state.newDescription = '';
    state.newLocation = '';
    state.locHint = '';
    state.locAttempted = false;
    showToast(t('reportSubmittedToast', {id: ticketId}));
    renderAduan();
  });
}

    state.claimDonation = '';
    state.claimCleanupDate = '';
    openClaimModal();
  }));

  $$('[data-join]').forEach(el => el.addEventListener('click', () => {
    openJoinModal(el.dataset.join);
  }));

  $$('[data-complete]').forEach(el => el.addEventListener('click', () => {
    state.completeTicket = el.dataset.complete;
    state.completePhoto = null;
    openCompletionModal();
  }));

  $$('[data-delete]').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ticketId = el.dataset.delete;
    if(!confirm(t('deleteConfirm', {id: ticketId}))) return;
    await deleteReport(ticketId);
    await loadReports();
    showToast(t('deleteToast', {id: ticketId}));
    renderVolunteer();
  }));
}

// ---------- claim modal ----------
function openClaimModal(){
  const report = state.reports.find(r => r.ticketId === state.claimTicket);
  if(!report) return;

  const canVolunteer = report.issueType === 'Illegal Trash Dumping Site';
  if(!canVolunteer) state.claimMode = 'Sponsored';
  const isSponsor = state.claimMode === 'Sponsored';

  const today = new Date();
  const minDate = today.toISOString().slice(0,10);
  const maxDate = new Date(today.getTime() + 7*24*60*60*1000).toISOString().slice(0,10);

  const logoField = isSponsor ? `
    <div class="field">
      <label>${t('businessLogoLabel')}</label>
      <div class="dropzone ${state.claimLogo?'has-img':''}" id="logoDz">
        ${state.claimLogo
          ? `<img src="${state.claimLogo}">`
          : `<label class="dz-label" style="cursor:pointer;"><span class="ic">${icon('store')}</span>${t('uploadLogo')}<input type="file" accept="image/*" id="logoInput"></label>`}
      </div>
    </div>
    <div class="field">
      <label>${t('websiteLabel')}</label>
      <input type="url" id="websiteInput" placeholder="https://..." value="${escapeHtml(state.claimWebsite || '')}">
    </div>
    <div class="field">
      <label>${t('donationLabel')}</label>
      <input type="text" inputmode="numeric" id="donationInput" placeholder="e.g. 250" value="${escapeHtml(state.claimDonation || '')}">
      <p class="loc-hint">${t('donationHint')}</p>
    </div>` : `
    <div class="field">
      <label>${t('cleanupDateLabel')}</label>
      <input type="date" id="cleanupDateInput" min="${minDate}" max="${maxDate}" value="${state.claimCleanupDate || minDate}">
      <p class="loc-hint">${t('cleanupDateHint')}</p>
    </div>`;

  $('#modalContent').innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="closeModal">${icon('close')}</button>
    <h2 class="section-title" style="margin-top:4px;">${report.ticketId}</h2>
    <p class="section-sub">${escapeHtml(report.description)}</p>

    ${canVolunteer ? `
    <div class="toggle-group">
      <div class="toggle-opt ${isSponsor?'selected':''}" data-mode="Sponsored">${icon('building')}${t('sponsorToggle')}</div>
      <div class="toggle-opt ${!isSponsor?'selected':''}" data-mode="Volunteer">${icon('hand')}${t('volunteerToggle')}</div>
    </div>` : `
    <p class="loc-hint">${t('onlyDumpingHint')}</p>`}

    <div class="field">
      <label>${isSponsor ? t('businessNameLabel') : t('groupNameLabel')}</label>
      <input type="text" id="nameInput" placeholder="${isSponsor ? t('businessNamePh') : t('groupNamePh')}" value="${escapeHtml(state.claimName || '')}">
    </div>
    ${logoField}
    <button class="btn btn-primary" id="confirmClaimBtn">
      ${isSponsor ? t('donateNowBtn') : t('scheduleCleanupBtn')}
    </button>
  `;

  $('#closeModal').addEventListener('click', closeClaimModal);
  $$('[data-mode]').forEach(el => el.addEventListener('click', () => {
    state.claimMode = el.dataset.mode;
    openClaimModal();
  }));

  const logoInput = $('#logoInput');
  if(logoInput) logoInput.addEventListener('change', async e => {
    const f = e.target.files[0];
    if(!f) return;
    state.claimLogo = await resizeImage(f, 300, 0.7);
    openClaimModal();
  });

  const cleanupDateInput = $('#cleanupDateInput');
  if(cleanupDateInput) cleanupDateInput.addEventListener('input', e => { state.claimCleanupDate = e.target.value; });

  $('#nameInput').addEventListener('input', e => { state.claimName = e.target.value; });
  const websiteInput = $('#websiteInput');
  if(websiteInput) websiteInput.addEventListener('input', e => { state.claimWebsite = e.target.value; });
  const donationInput = $('#donationInput');
  if(donationInput) donationInput.addEventListener('input', e => { state.claimDonation = e.target.value; });

  $('#confirmClaimBtn').addEventListener('click', async () => {
    const name = $('#nameInput').value.trim();
    if(!name){ showToast(t('errName')); return; }

    if(isSponsor){
      const website = $('#websiteInput').value.trim();
      const donationRaw = $('#donationInput').value.trim();
      const donationAmount = parseFloat(donationRaw.replace(/[^0-9.]/g, ''));
      if(!website){ showToast(t('errWebsite')); return; }
      if(!donationRaw || isNaN(donationAmount) || donationAmount <= 0){ showToast(t('errDonation')); return; }

      const btn = $('#confirmClaimBtn');
      btn.disabled = true; btn.textContent = t('processingDonation');

      report.status = 'In Progress';
      report.fulfillmentType = 'Sponsored';
      report.sponsorVolunteerName = name;
      report.sponsorLogo = state.claimLogo || '';
      report.sponsorWebsite = website;
      report.donationAmount = donationAmount;

      await saveReport(report);
      await loadReports();
      closeClaimModal();
      showToast(t('donateThanksToast', {amount: donationAmount, id: report.ticketId}));
      renderBantu();
      return;
    }

    // Volunteer flow: schedule a cleanup within the next 7 days.
    const cleanupDate = $('#cleanupDateInput').value;
    if(!cleanupDate){ showToast(t('errCleanupDate')); return; }
    if(cleanupDate < minDate || cleanupDate > maxDate){ showToast(t('errCleanupWithin7')); return; }

    const btn = $('#confirmClaimBtn');
    btn.disabled = true; btn.textContent = t('scheduling');

    report.status = 'Volunteer Scheduled';
    report.fulfillmentType = 'Volunteer';
    report.sponsorVolunteerName = name;
    report.sponsorLogo = '';
    report.sponsorWebsite = '';
    report.cleanupDate = cleanupDate;
    report.volunteers = [name];

    await saveReport(report);
    await loadReports();
    closeClaimModal();
    state.claimCleanupDate = '';
    state.view = 'volunteer';
    showToast(t('cleanupScheduledToast', {date: formatDate(cleanupDate)}));
    render();
  });

  $('#modalOverlay').classList.add('show');
}
function closeClaimModal(){
  $('#modalOverlay').classList.remove('show');
  state.claimTicket = null;
  state.claimName = '';
  state.claimWebsite = '';
  state.claimDonation = '';
  state.claimCleanupDate = '';
  state.claimLogo = null;
}

function closeCompletionModal(){

// ---------- join modal (another user joins a scheduled volunteer cleanup) ----------
function openJoinModal(ticketId){
  state.joinTicket = ticketId;
  state.joinName = '';
  const report = state.reports.find(r => r.ticketId === ticketId);
  if(!report) return;

  $('#modalContent').innerHTML = `

  `;

  $('#confirmJoinBtn').addEventListener('click', async () => {
    const name = $('#joinNameInput').value.trim();
    if(!name){ showToast(t('errYourName')); return; }

    report.volunteers = [...(report.volunteers || []), name];

    closeJoinModal();
    showToast(t('joinedToast', {id: report.ticketId}));
    renderVolunteer();

  $('#modalOverlay').classList.add('show');

function closeJoinModal(){
  $('#modalOverlay').classList.remove('show');
  state.joinTicket = null;
  state.joinName = '';
}

  const myJobs = state.reports.filter(r => r.status === 'In Progress' && r.contractorId === state.myContractorId);

  const availableHtml = available.length ? available.map(r => {
    const m = issueMeta(r.issueType);

            <span class="ticket-id">${r.ticketId}</span>
            <button class="del-btn" data-delete="${r.ticketId}" title="${t('deleteBtnTitle')}">${icon('trash')}</button>
          </div>
          <p class="report-desc">${escapeHtml(r.description)}</p>
          <p class="report-loc">${icon('pin')}${escapeHtml(r.location)}</p>

      ${c.legalDoc ? `<img class="sponsor-logo" style="width:44px;height:44px;" src="${c.legalDoc}">` : ''}
      <div class="contrib-text">
        <p class="contrib-name">${escapeHtml(c.name)}</p>
        <p class="contrib-role">${c.contractorId} · ${escapeHtml(c.phone)}</p>
      </div>

    <h3 class="subsection-title">${t('myActiveJobs')}</h3>
    ${myJobsHtml}

    <h3 class="subsection-title">${t('availableJobsTitle')}</h3>
    ${availableHtml}

  $('#backToProfileBtn').addEventListener('click', () => {
    state.profileSubview = 'home';
    state.view = 'profile';

  });

  $$('[data-takejob]').forEach(el => el.addEventListener('click', async () => {
    const report = state.reports.find(r => r.ticketId === el.dataset.takejob);
    if(!report) return;
    report.contractorId = state.myContractorId;
    report.contractorName = state.myContractor.name;
    report.jobDeadline = new Date(Date.now() + 14*24*60*60*1000).toISOString();
    await saveReport(report);
    await loadReports();
    showToast(t('jobTakenToast', {id: report.ticketId, date: formatDate(report.jobDeadline)}));
    renderContractorDashboard();
  }));

  $$('[data-complete]').forEach(el => el.addEventListener('click', () => {
    state.completeTicket = el.dataset.complete;
    state.completePhoto = null;
    openCompletionModal();
  }));

  $('#switchContractorBtn').addEventListener('click', async () => {
    await storSet('my-contractor-id', '', false);
    state.myContractorId = null;
    state.myContractor = null;
    renderContractor();
  });

  $$('[data-delete]').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ticketId = el.dataset.delete;
    if(!confirm(t('deleteConfirm', {id: ticketId}))) return;
    await deleteReport(ticketId);
    await loadReports();
    showToast(t('deleteToast', {id: ticketId}));
    renderContractorDashboard();
  }));
}

function renderContractor(){
  if(!state.myContractor) renderContractorSignup();
  else renderContractorDashboard();
}

    const m = issueMeta(r.issueType);
    const isSponsor = r.fulfillmentType === 'Sponsored';
    const contrib = isSponsor ? `
      <div class="hero-contrib">
        ${r.sponsorLogo ? `<img class="sponsor-logo" src="${r.sponsorLogo}">` : `${sponsorBox(r.sponsorVolunteerName)}`}
        <div class="contrib-text">
          <p class="contrib-name">${escapeHtml(r.sponsorVolunteerName)}</p>
          <p class="contrib-role">${t('sponsoredText', {amount: r.donationAmount || '—'})}</p>
        </div>
        ${r.sponsorWebsite ? `<a class="visit-btn" href="${r.sponsorWebsite}" target="_blank" rel="noopener">${t('visitBtn')}</a>` : ''}
      </div>` : `
      <div class="hero-contrib">
        <div class="sponsor-logo" style="background:var(--accent-soft);color:var(--accent);">${icon('hand')}</div>
        <div class="contrib-text">
          <p class="contrib-name">${escapeHtml(r.sponsorVolunteerName)}${t('groupSuffix')}</p>
          <p class="contrib-role">${communityVolunteerCountText((r.volunteers && r.volunteers.length) || 1)}</p>
        </div>
      </div>`;

    return `
      <div class="hero-card">
        <div class="compare-wrap">
          <img class="before-img" src="${r.beforePhoto}">
          <img class="after-img" src="${r.afterPhoto}" style="clip-path:inset(0 50% 0 0);">
          <span class="compare-label label-before">${state.lang === 'ms' ? 'SEBELUM' : 'BEFORE'}</span>
          <span class="compare-label label-after">${state.lang === 'ms' ? 'SELEPAS' : 'AFTER'}</span>
          <input type="range" class="compare-slider" min="0" max="100" value="50" data-slider>
        </div>
        <div class="hero-body">
          <div class="badge-row">
            <span class="pill pill-type">${m.icon} ${issueLabel(r.issueType)}</span>
            <span class="pill pill-completed">${t('completedPill')}</span>
            <span class="ticket-id">${r.ticketId}</span>
            <button class="del-btn" data-delete="${r.ticketId}" title="${t('deleteBtnTitle')}">${icon('trash')}</button>
          </div>
          <p class="report-loc" style="margin-bottom:0;">${icon('pin')}${escapeHtml(r.location)}</p>
          ${contrib}
        </div>
      </div>`;
  }).join('') : `
    <div class="empty-state">
      <span class="ic">${icon('trophy')}</span>
      <p>${t('emptyCompleted')}</p>
    </div>`;

  const leaders = await loadLeaderboard();
  const leaderHtml = leaders.length ? leaders.map((p, idx) => {
    const avatar = p.avatar
      ? `<img class="leader-avatar" src="${p.avatar}">`
      : `${avatarBox(p.name,'leader-avatar-fallback')}`;
    const you = (state.myProfile && p.profileId === state.myProfile.profileId) ? ` ${t('youSuffix')}` : '';
    return `
      <div class="leader-row">
        <span class="leader-rank">#${idx + 1}</span>
        ${avatar}
        <span class="leader-name">${escapeHtml(p.name)}${you}</span>
        <span class="leader-points">${t('pointsSuffix', {n: p.points || 0})}</span>
      </div>`;
  }).join('') : `
    <div class="empty-state">
      <span class="ic">${icon('medal')}</span>
      <p>${t('leaderboardEmpty')}</p>
    </div>`;

  $('#main').innerHTML = `
    <h2 class="section-title">${t('wallTitle')}</h2>
    <p class="section-sub">${t('wallSub')}</p>
    ${html}

    <h3 class="subsection-title">${t('leaderboardTitle')}</h3>
    <p class="section-sub">${t('leaderboardSub')}</p>
    <div class="card">
      ${leaderHtml}
    </div>
  `;

  motionMain();

  $$('[data-slider]').forEach(slider => {
    const wrap = slider.closest('.compare-wrap');
    const afterImg = wrap.querySelector('.after-img');
    slider.addEventListener('input', () => {
      afterImg.style.clipPath = `inset(0 ${100 - slider.value}% 0 0)`;
    });
  });

  $$('[data-delete]').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ticketId = el.dataset.delete;
    if(!confirm(t('deleteConfirm', {id: ticketId}))) return;
    await deleteReport(ticketId);
    await loadReports();
    showToast(t('deleteToast', {id: ticketId}));
    renderWall();
  }));
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ---------- master render ----------
function render(){
  renderChrome();
  const v = state.view;
  if(v === 'aduan') renderAduan();
  else if(v === 'bantu') renderBantu();
  else if(v === 'volunteer') renderVolunteer();
  else if(v === 'wall'){ renderWall(); return; }
  else if(v === 'contractor') renderContractor();
  else if(v === 'profile') renderProfile();
  motionMain();
}

async function reloadData(){
  const savedLang = await storGet('lang', false);
  if(savedLang === 'en' || savedLang === 'ms') state.lang = savedLang;
  await loadReports();
  await loadMyContractor();
  await loadMyProfile();
  renderTopbarText();
  render();
}

/* ==================== cloud sync (Supabase) ==================== */
let pushTimer = null, cloudOk = false;
function syncState(ok){
  cloudOk = ok;
  const d = $('#syncDot'), l = $('#syncLabel'); if(!d) return;
  d.classList.toggle('on', ok);
  l.textContent = ok
    ? (state.lang==='ms' ? 'Disegerak ke akaun anda' : 'Synced to your account')
    : (cloud ? (state.lang==='ms' ? 'Luar talian — disimpan pada peranti' : 'Offline — saved on this device')
             : (state.lang==='ms' ? 'Tempatan sahaja' : 'Local only'));
}
function collectLocal(){
  const o = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf(LS_PREFIX)===0) o[k.slice(LS_PREFIX.length)] = localStorage.getItem(k);
  }
  return o;
}
function scheduleCloudPush(){
  if(suspendPush || !cloud || !account) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushCloud, 1200);
}
async function pushCloud(){
  if(!cloud || !account) return;
  try{
    const { error } = await cloud.from(CLOUD_TABLE)
      .upsert({ user_id: account.uid, payload: collectLocal(), updated_at: new Date().toISOString() });
    syncState(!error);
  }catch(e){ syncState(false); }
}
async function pullCloud(){
  if(!cloud || !account) return;
  try{
    const { data, error } = await cloud.from(CLOUD_TABLE)
      .select('payload').eq('user_id', account.uid).maybeSingle();
    if(error){ syncState(false); return; }
    if(data && data.payload && Object.keys(data.payload).length){
      suspendPush = true;
      Object.keys(data.payload).forEach(k => localStorage.setItem(LS_PREFIX + k, data.payload[k]));
      suspendPush = false;
      syncState(true);
    }else{
      await pushCloud(); // first login on this account: seed the row from local
    }
  }catch(e){ syncState(false); }
}

/* ==================== auth ==================== */
let authMode = 'login';
let pendingConfirmEmail = '';
const resendCooldownUntil = { login: 0, panel: 0 };
let resendTimers = { login: null, panel: null };
function L(en, ms){ return state.lang==='ms' ? ms : en; }
function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function setAuthErr(m, showResend){
  const e=$('#authErr'); if(!e) return;
  e.textContent=m||''; e.classList.toggle('show', !!m);
  const r=$('#resendLoginBtn');
  if(r) r.classList.toggle('show', !!showResend);
}
function resendLabel(){ return L('Resend confirmation email','Hantar semula e-mel pengesahan'); }
function tickResendCooldown(key, btn){
  clearInterval(resendTimers[key]);
  resendTimers[key] = setInterval(() => {
    const left = Math.ceil((resendCooldownUntil[key] - Date.now())/1000);
    if(left <= 0){
      clearInterval(resendTimers[key]);
      btn.disabled = false;
      btn.textContent = resendLabel();
    }else{
      btn.disabled = true;
      btn.textContent = L('Resend in '+left+'s','Hantar semula dalam '+left+'s');
    }
  }, 250);
}
async function doResend(key, email, btn, noteEl){
  if(!cloud || !email || !validEmail(email)) return;
  if(Date.now() < resendCooldownUntil[key]) return;
  btn.disabled = true;
  const prevLabel = btn.textContent;
  btn.textContent = L('Sending…','Menghantar…');
  try{
    const { error } = await cloud.auth.resend({ type:'signup', email, options:{ emailRedirectTo: APP_URL } });
    if(error){
      if(noteEl){ noteEl.textContent = error.message; noteEl.classList.add('show'); }
      else showToast(error.message);
      btn.disabled = false; btn.textContent = prevLabel;
      return;
    }
    if(noteEl){
      noteEl.textContent = L('Confirmation email sent again — check your inbox.','E-mel pengesahan dihantar semula — semak peti masuk anda.');
      noteEl.classList.add('show');
    }else{
      showToast(L('Confirmation email sent.','E-mel pengesahan telah dihantar.'));
    }
    resendCooldownUntil[key] = Date.now() + 30000;
    tickResendCooldown(key, btn);
  }catch(e){
    btn.disabled = false; btn.textContent = prevLabel;
  }
}
function applyAuthMode(){
  // Email + password, no verification. One form that logs in or creates the account.
  $('#authTitle').textContent = L('Sign in or sign up','Log masuk atau daftar');
  $('#authSub').textContent   = L('Enter your email and a password. No confirmation email — new accounts are ready right away.',
                                  'Masukkan e-mel dan kata laluan. Tiada e-mel pengesahan — akaun baharu terus sedia.');
  $('#authCta').textContent = L('Continue','Teruskan');
  setAuthErr('');
}
function showAuth(){
  const a = $('#authScreen'); a.hidden = false;
  $('#appShell').style.display = 'none';
  $('#authForm').style.display = ''; $('#confirmPanel').style.display = 'none';
  applyAuthMode();
  if(hasGsap()){
    gsap.fromTo('#authCard',{y:24,autoAlpha:0},{y:0,autoAlpha:1,duration:.7,ease:'power3.out'});
    gsap.to('.auth .b1',{x:30,y:24,duration:9,repeat:-1,yoyo:true,ease:'sine.inOut'});
    gsap.to('.auth .b2',{x:-26,y:-20,duration:11,repeat:-1,yoyo:true,ease:'sine.inOut'});
    gsap.to('.auth .b3',{x:20,y:-26,duration:8,repeat:-1,yoyo:true,ease:'sine.inOut'});
  }
}
function showApp(){ $('#authScreen').hidden = true; $('#appShell').style.display = ''; }
async function submitAuth(){
  if(!cloud){ setAuthErr('Cloud is not configured.'); return; }
  const email = $('#authEmail').value.trim().toLowerCase();
  const pass  = $('#authPass').value;
  if(!validEmail(email)){ setAuthErr(L('Enter a valid email address.','Masukkan alamat e-mel yang sah.')); return; }
  if(pass.length < 6){ setAuthErr(L('Password needs at least 6 characters.','Kata laluan perlu sekurang-kurangnya 6 aksara.')); return; }
  const wrongPw = L('That email already has an account — check your password.','E-mel itu sudah mempunyai akaun — semak kata laluan anda.');
  const cta=$('#authCta'); const prev=cta.textContent; cta.disabled=true; cta.textContent=L('One moment…','Sebentar…');
  try{
    // Existing account → log in.
    const { error } = await cloud.auth.signInWithPassword({ email, password:pass });
    if(error){
      // Either a new email, or a wrong password on an existing one — try to create it.
      const name = email.split('@')[0];
      const res = await cloud.auth.signUp({ email, password:pass, options:{ data:{ name } } });
      if(res.error){
        setAuthErr(/registered|already/i.test(res.error.message) ? wrongPw : res.error.message);
        return;
      }
      // Supabase returns a fake user with empty identities when the email already exists.
      if(res.data.user && (res.data.user.identities||[]).length === 0){ setAuthErr(wrongPw); return; }
      if(!res.data.session){
        const retry = await cloud.auth.signInWithPassword({ email, password:pass });
        if(retry.error){ setAuthErr(wrongPw); return; }
      }
    }
    // onAuthStateChange → enterUser takes it from here.
  }catch(e){ setAuthErr(L('Could not reach the server. Check your connection and try again.','Tidak dapat menghubungi pelayan. Semak sambungan anda.')); }
  finally{ cta.disabled=false; cta.textContent=prev; }
}
async function enterUser(user){
  account = { email:user.email, uid:user.id, name:(user.user_metadata&&(user.user_metadata.name||user.user_metadata.full_name))||user.email.split('@')[0] };
  LS_PREFIX = 'prihatin-selangor::' + user.id + '::';
  showApp();
  await reloadData();      // instant, from local cache for this account
  syncState(true);
  await pullCloud();       // then hydrate from the cloud
  await reloadData();
}
async function signOut(){
  if(cloud){ try{ await cloud.auth.signOut(); }catch(e){} }
  account = null;
  showAuth();
}
function wireChrome(){
  $('#resetDataBtn').innerHTML = icon('trash');
  $('#signOutBtn').innerHTML = icon('logout');
  $('#brandMark').innerHTML = icon('leaf');
  $('#authMark').innerHTML = icon('leaf');
  $('#confirmIcon').innerHTML = icon('mail');
  $('#langToggleBtn').addEventListener('click', () => setLang(state.lang==='ms' ? 'en' : 'ms'));
  $('#resetDataBtn').addEventListener('click', async () => {
    if(!confirm(t('resetConfirm'))) return;
    await clearAllAppData();
    state.reports=[]; state.myContractorId=null; state.myContractor=null;
    state.myProfileId=null; state.myProfile=null; state.view='aduan';
    showToast(t('resetToast')); render();
  });
  $('#signOutBtn').addEventListener('click', signOut);
  if(!cloud) $('#signOutBtn').style.display='none';
  // auth form wiring
  $('#authCta').addEventListener('click', submitAuth);
  $('#authSwitchBtn').addEventListener('click', () => { authMode = authMode==='signup'?'login':'signup'; applyAuthMode(); });
  ['authEmail','authPass','authName'].forEach(id => { const el=$('#'+id); if(el) el.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); submitAuth(); } }); });
  $('#confirmBack').addEventListener('click', () => { $('#confirmPanel').style.display='none'; $('#authForm').style.display=''; authMode='login'; applyAuthMode(); });
  $('#resendBtn').addEventListener('click', () => doResend('panel', pendingConfirmEmail, $('#resendBtn'), $('#resendNote')));
  $('#resendLoginBtn').addEventListener('click', () => doResend('login', pendingConfirmEmail || $('#authEmail').value.trim(), $('#resendLoginBtn'), null));
}
async function startApp(){
  wireChrome();
  if(!cloud){ account=null; showApp(); await reloadData(); syncState(false); return; }
  cloud.auth.onAuthStateChange((ev, session) => {
    if(ev==='SIGNED_IN' && session && (!account || account.uid!==session.user.id)) enterUser(session.user);
    if(ev==='SIGNED_OUT'){ account=null; showAuth(); }
  });
  const { data:{ session } } = await cloud.auth.getSession();
  if(session) enterUser(session.user); else showAuth();
}
startApp();
</script>
